# ./tornado-backend/docker-compose.yml

services:
  postgres:
    image: postgres:10.3
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog
    ports:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
  blog:
    build: .
    links:
      - postgres
    ports:
      - "8888:8888"
    command: --db_host=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
