# .

services:
  react-frontend:
    build:
      context: ./react-frontend
      dockerfile: Dockerfile
    volumes:
      - ./react-frontend/my-react-app:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true # To support live reloading on mounted volumes
    command: ["npm", "start"]
    depends_on:
      tornado-backend:
        condition: service_started
    networks:
      - app-network      

  tornado-backend:
    build: ./tornado-backend
    links:
      - postgres
    ports:
      - "8888:8888"
    volumes:
      - ./tornado-backend/blog.py:/usr/src/app/blog.py      
    command: --db_host=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - app-network    

  postgres:
    image: postgres:10.3
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog
    ports:
      - "5432:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - app-network      

  adminer:
    image: adminer
    ports:
      - 8080:8080
    networks:
      - app-network      

networks:
  app-network:
    driver: bridge
